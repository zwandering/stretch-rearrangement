# YOLOE open-vocabulary detection config.
#
# Each object entry:
#   name     : stable id used as tracker label / marker namespace / planner key.
#              Must be unique and match entries in tasks.yaml.
#   prompts  : text phrases fed to YOLOE.set_classes. Multiple synonyms are
#              allowed and all get mapped back to this object's `name` at runtime.
#
# Keep the list to exactly the three target objects; the detector node expects
# three trackable entries for the rearrangement task.
objects:
  - name: white_bottle
    prompts: ["white bottle", "white water bottle"]

  - name: green_cup
    prompts: ["green cup", "green mug"]

  - name: blue_cup
    prompts: ["blue cup", "blue mug"]
