# Region polygons in the map frame (meters, map coordinates).
# The quadrant layout below assumes the robot is placed near the origin.
# Re-annotate after building your real map; every polygon is CCW, non-self-intersecting.
regions:
  - name: A                               # front-right quadrant
    polygon:
      - [ -0.45,  2.61]
      - [ -0.35,  0.96]
      - [ 1.79,  0.99]
      - [ 1.76,  2.6]
    place_anchor: [ 0.6,  1.0, 0.0]       # x, y, yaw — robot pose when placing here
    color: [1.0, 0.5, 0.5]

  - name: B                               # front-left quadrant
    polygon:
      - [1.89,  1.0]
      - [1.89, -1.1]
      - [3.30, -1.1]
      - [3.30,  1.0]
    place_anchor: [1.7,  0.0, 0.0]
    color: [0.5, 1.0, 0.5]