# Region polygons in the map frame (meters, map coordinates).
# The quadrant layout below assumes the robot is placed near the origin.
# Re-annotate after building your real map; every polygon is CCW, non-self-intersecting.
regions:
  - name: A                               # front-right quadrant
    polygon:
      - [ 0.0,  0.0]
      - [ 3.0,  0.0]
      - [ 3.0,  3.0]
      - [ 0.0,  3.0]
    place_anchor: [ 1.5,  1.5, 0.0]       # x, y, yaw — robot pose when placing here
    color: [1.0, 0.5, 0.5]

  - name: B                               # front-left quadrant
    polygon:
      - [-3.0,  0.0]
      - [ 0.0,  0.0]
      - [ 0.0,  3.0]
      - [-3.0,  3.0]
    place_anchor: [-1.5,  1.5, 0.0]
    color: [0.5, 1.0, 0.5]

  - name: C                               # back-right quadrant
    polygon:
      - [ 0.0, -3.0]
      - [ 3.0, -3.0]
      - [ 3.0,  0.0]
      - [ 0.0,  0.0]
    place_anchor: [ 1.5, -1.5, 3.14159]
    color: [0.5, 0.7, 1.0]

  - name: D                               # back-left quadrant
    polygon:
      - [-3.0, -3.0]
      - [ 0.0, -3.0]
      - [ 0.0,  0.0]
      - [-3.0,  0.0]
    place_anchor: [-1.5, -1.5, 3.14159]
    color: [1.0, 0.9, 0.4]
